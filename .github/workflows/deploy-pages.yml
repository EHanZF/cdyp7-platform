name: Deploy React App to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Generate fresh data
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend deps
        run: pip install -r requirements.txt

      - name: Fetch dashboard data
        run: python codebeamer_mcp_fetcher.py fetch

      # ✅ Copy data into frontend/public
      - name: Move data into frontend
        run: |
          mkdir -p frontend/public/data
          cp data/results/latest.json frontend/public/data/latest.json

      # ✅ Build React app
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build Vite app
        working-directory: frontend
        run: npm run build

      # ✅ Upload build output
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
      
      - name: Override index
        run: |
          cp
          frontend/public/static/cdyp7-codebeamer-dashboard.html
          frontend/dist/index.html