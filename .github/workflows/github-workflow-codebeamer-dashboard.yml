name: CDYP7 Codebeamer Dashboard Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: cdyp7-codebeamer-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CB_URL: ${{ secrets.CB_URL }}
      CB_TOKEN: ${{ secrets.CB_TOKEN }}
      CB_QUERY: ${{ vars.CB_QUERY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch dashboard data
        run: python codebeamer_mcp_fetcher.py fetch
      - name: Commit dashboard state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/results/latest.json data/receipts/latest.json
          git commit -m "refresh Codebeamer dashboard state" || true
          git push
      - name: Fetch dashboard data
        run: |
          export CB_QUERY="${CB_QUERY:-status != 'Closed'}"
          python codebeamer_mcp_fetcher.py fetch
