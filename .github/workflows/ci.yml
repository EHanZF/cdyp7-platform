name: CDYP7 CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches-ignore:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pytest

      - name: Syntax check
        run: |
          python -m py_compile run_gateway.py
          python -m py_compile app/gateway/rvs_http_gateway.py

      - name: Import test
        run: |
          python -c "from app.gateway.rvs_http_gateway import app"

      - name: Run tests
        run: pytest -q