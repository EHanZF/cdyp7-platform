name: CDYP7 RV&S Dashboard Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: cdyp7-rvs-dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: self-hosted
    permissions:
      contents: write
    env:
      RVS_HOST: skobde-mks.kobde.trw.com
      RVS_PORT: "7001"
      RVS_USER: ${{ secrets.RVS_USER }}
      RVS_PASSWORD: ${{ secrets.RVS_PASSWORD }}
      RVS_QUERY: ${{ vars.RVS_QUERY || 'All' }}
      RVS_FIELDS: "ID,Summary,State,Assigned User,Type,Priority,ALM_Delivery,Target Date"
      RVS_DELIVERY_FIELD: "ALM_Delivery"
      RVS_DELIVERY_DATE_FIELD: "Target Date"
      RVS_OWNER_FIELD: "Assigned User"
      CDYP7_OUTPUT: data/results/latest.json
      CDYP7_RECEIPT: data/receipts/latest.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r requirements-rvs-mcp.txt
      - name: Fetch RV&S dashboard state
        run: python app/mcp/ptc_rvs_mcp_server.py fetch
      - name: Commit state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/results/latest.json data/receipts/latest.json
          git commit -m "refresh RV&S dashboard state" || true
          git push
